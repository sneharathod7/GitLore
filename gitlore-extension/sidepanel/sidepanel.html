<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../vendor/prism-tomorrow.min.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-primary">
        <div class="topbar-brand">
          <span class="logo">GitLore</span>
        </div>
        <p id="repoTitle" class="repo-title" title=""></p>
      </div>
      <div class="topbar-toolbar">
        <div class="topbar-buttons">
          <button type="button" id="btnRepoPicker" class="btn btn-sm">Switch repo</button>
          <button
            type="button"
            id="btnRefreshIngest"
            class="btn btn-sm hidden"
            title="Refresh ingest status from the GitLore server"
          >
            Refresh ingest
          </button>
        </div>
        <div id="analyzeStatus" class="analyze-status" aria-live="polite"></div>
      </div>
    </header>

    <div class="layout chat-layout">
      <section class="chat-section">
        <h2 class="chat-heading">Chat</h2>
        <p class="chat-subtle">Markdown replies · short answers by default</p>
        <div id="geminiKeyNotice" class="gemini-key-notice hidden">
          Add a <strong>Gemini API key</strong> in the GitLore popup (<strong>Settings</strong>) so chat can run. Get a key at
          <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <textarea
            id="chatInput"
            class="chat-input"
            rows="2"
            placeholder="e.g. What does the auth module do?"
            autocomplete="off"
          ></textarea>
          <button type="submit" class="btn btn-send">Send</button>
        </form>
      </section>
    </div>

    <div id="repoPickerModal" class="repo-picker-modal hidden" role="dialog" aria-modal="true" aria-labelledby="repoPickerTitle">
      <div class="repo-picker-dialog">
        <div class="repo-picker-head">
          <h2 id="repoPickerTitle" class="repo-picker-title">Switch repository</h2>
          <button type="button" id="btnCloseRepoPicker" class="btn btn-sm btn-close-modal" aria-label="Close">
            ×
          </button>
        </div>
        <input
          type="search"
          id="repoPickerSearch"
          class="repo-picker-search"
          placeholder="Filter repositories…"
          autocomplete="off"
        />
        <div id="repoPickerStatus" class="repo-picker-status"></div>
        <ul id="repoPickerList" class="repo-picker-list"></ul>
      </div>
    </div>

    <script src="../vendor/prism-core.min.js"></script>
    <script src="../vendor/prism-markup.min.js"></script>
    <script src="../vendor/prism-clike.min.js"></script>
    <script src="../vendor/prism-javascript.min.js"></script>
    <script src="../vendor/prism-typescript.min.js"></script>
    <script src="../vendor/prism-json.min.js"></script>
    <script src="../vendor/prism-bash.min.js"></script>
    <script src="../vendor/prism-css.min.js"></script>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
